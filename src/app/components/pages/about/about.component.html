<section class="aboutSection">
  <div class="leftDiv">
    <app-profile></app-profile>
    <a class="certificates-and-design" href="{{ links[0] }}" target="_blank">
      Certificados
    </a>
  </div>
  <div class="infoDiv">
    <div class="expertisesDiv">
      <app-core-expertise></app-core-expertise>
    </div>
    <div class="skillsDiv">
      <div class="container" id="alternatorContainer">
        <span class="myTechs">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            fill="currentColor"
            class="bi bi-code-slash"
            viewBox="0 0 16 16"
          >
            <path
              d="M10.478 1.647a.5.5 0 1 0-.956-.294l-4 13a.5.5 0 0 0 .956.294l4-13zM4.854 4.146a.5.5 0 0 1 0 .708L1.707 8l3.147 3.146a.5.5 0 0 1-.708.708l-3.5-3.5a.5.5 0 0 1 0-.708l3.5-3.5a.5.5 0 0 1 .708 0zm6.292 0a.5.5 0 0 0 0 .708L14.293 8l-3.147 3.146a.5.5 0 0 0 .708.708l3.5-3.5a.5.5 0 0 0 0-.708l-3.5-3.5a.5.5 0 0 0-.708 0z"
            />
          </svg>
          <h1 class="skillsTitle">Tecnologias</h1>
        </span>
        <app-front-end *ngIf="activeTab === 'frontend'"></app-front-end>

        <app-back-end *ngIf="activeTab === 'backend'"></app-back-end>

        <app-others *ngIf="activeTab === 'others'"></app-others>
        <div class="techSelector">
          <button
            class="techBtns"
            [class.active]="activeTab === 'frontend'"
            (click)="selectTab('frontend')"
          >
            Front-End
          </button>

          <button
            class="techBtns"
            [class.active]="activeTab === 'backend'"
            (click)="selectTab('backend')"
          >
            Back-End
          </button>

          <button
            class="techBtns"
            [class.active]="activeTab === 'others'"
            (click)="selectTab('others')"
          >
            Outras
          </button>
        </div>
      </div>
    </div>
    <div class="workDiv">
      <h1 class="workTitle">Experiência Profissional</h1>
      <app-experiences></app-experiences>
    </div>
    <div class="studiesDiv">
      <h1 class="workTitle pb-2">Formação Acadêmica</h1>
      <app-studies></app-studies>
    </div>
  </div>
</section>
